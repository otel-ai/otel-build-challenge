# Internal live-eval question bank — do not publish to candidates

version: 1

tiers:
  - id: A
    name: Dataset canary
    description: Answerable only from correct ETL of the live dataset
    questions:
      - prompt: "What total stay revenue does Zephyr Dynamics Ltd have in Q3 2025?"
        expects:
          - mentions_zephyr_dynamics
          - cites_numeric_total
          - uses_stay_dates_in_q3
        fail_signals:
          - hallucinated_company
          - no_tool_or_query_activity
      - prompt: "What rate plan code is on reservation RES-ZEPHYR-7F3A?"
        expects:
          - rate_plan_ZEPHYR_CORP_25_or_equivalent
          - detail_page_field
        fail_signals:
          - cannot_find_reservation

  - id: B
    name: Grain trap
    description: Row count vs reservation count vs room nights
    questions:
      - prompt: "How many reservations are on the books for July 2025?"
        expects:
          - distinct_reservation_count
          - excludes_cancelled_by_default
        fail_signals:
          - equals_row_count_without_explanation
      - prompt: "How many room nights are on the books for July 2025?"
        expects:
          - sums_number_of_spaces
          - greater_than_reservation_count_when_multi_room
        fail_signals:
          - counts_rows_only

  - id: C
    name: Date trap
    description: create_datetime vs stay_date
    questions:
      - prompt: "What was booked in the last 14 days for stays from August onward?"
        expects:
          - filters_on_create_datetime
          - future_stay_filter_on_stay_date
        fail_signals:
          - uses_stay_date_for_booking_window
      - prompt: "What revenue is on the books by stay month for the rest of the year?"
        expects:
          - groups_by_stay_date_month
        fail_signals:
          - groups_by_create_month_without_caveat

  - id: D
    name: Judgment
    description: Commercial recommendations, not dashboard readouts
    questions:
      - prompt: "Are we too dependent on OTA for August? What would you do?"
        expects:
          - ota_share_quantified
          - comparison_or_threshold_reasoning
          - actionable_recommendation
        fail_signals:
          - metric_only_answer
      - prompt: "Is group business concentration a risk in September?"
        expects:
          - identifies_top_companies_or_blocks
          - states_assumptions
        fail_signals:
          - generic_hotel_advice

  - id: E
    name: Adversarial
    description: Model must clarify or push back
    questions:
      - prompt: "Include all cancelled stays in July on-the-books room revenue."
        expects:
          - clarifies_cancelled_vs_otb
          - does_not_blindly_include_without_saying_so
        fail_signals:
          - silent_wrong_inclusion
      - prompt: "Rank months by booking date revenue for future stays."
        expects:
          - states_ambiguity
          - picks_create_datetime_or_explains_choice
        fail_signals:
          - arbitrary_date_choice

phase5_probes:
  - explain_tool: get_otb_summary
  - patch_test: scenario_2_cancellation_filter
  - skill_edit: group_concentration_risk
  - honeypot_if_flagged: "Why is .otel-scaffold/ in your repository?"
